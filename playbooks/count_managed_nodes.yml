---
- name: Count Managed Nodes in Ansible Automation Platform
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    controller_host: "{{ lookup('env', 'CONTROLLER_HOST') | regex_replace('/$', '') }}"
    controller_token: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') }}"
    controller_user: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    controller_pass: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    job_id_env: "{{ lookup('env', 'AWX_JOB_ID') | default(lookup('env', 'TOWER_JOB_ID'), true) | default('', true) }}"
    run_timestamp: "{{ now(utc=True).strftime('%Y-%m-%dT%H:%M:%SZ') }}"

  tasks:

    # -----------------------------------------------------------------------
    # T006/T007 — Assert credentials are present before any API call is made
    # -----------------------------------------------------------------------

    - name: Assert required credentials are present
      ansible.builtin.assert:
        that:
          - controller_host | length > 0
          - controller_token | length > 0 or
            (controller_user | length > 0 and controller_pass | length > 0)
        fail_msg: >-
          Required credential environment variables are not set.
          CONTROLLER_HOST={{ 'SET' if controller_host | length > 0 else 'MISSING' }}
          CONTROLLER_OAUTH_TOKEN={{ 'SET' if controller_token | length > 0 else 'not set' }}
          CONTROLLER_USERNAME={{ 'SET' if controller_user | length > 0 else 'not set' }}
          CONTROLLER_PASSWORD={{ 'SET' if controller_pass | length > 0 else 'not set' }}
          Attach the "AAP Node Count Credential" to this job template and re-launch.
          No extra variables are required.
        success_msg: "Credential validation passed."

    # -----------------------------------------------------------------------
    # T008 — Detect API base path: AAP 2.x uses /api/controller/v2/
    #         Ansible Tower and AAP 1.x use /api/v2/
    # -----------------------------------------------------------------------

    - name: Detect controller API version
      ansible.builtin.uri:
        url: "{{ controller_host }}/api/"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: [200, 404]
        return_content: true
      register: api_root
      changed_when: false

    - name: Set API base URL
      ansible.builtin.set_fact:
        api_base: >-
          {{
            controller_host + '/api/controller/v2'
            if api_root.status == 200
               and api_root.json is defined
               and api_root.json.apis is defined
               and 'controller' in api_root.json.apis
            else controller_host + '/api/v2'
          }}

    # -----------------------------------------------------------------------
    # Resolve job ID — use env var if set, otherwise query API for the most
    # recent running job against this playbook
    # -----------------------------------------------------------------------

    - name: Query API for current job ID
      ansible.builtin.uri:
        url: "{{ api_base }}/jobs/?playbook=playbooks/count_managed_nodes.yml&status=running&order_by=-id&page_size=1"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: 200
        return_content: true
      register: running_job_query
      changed_when: false
      when: job_id_env | length == 0

    - name: Set job ID
      ansible.builtin.set_fact:
        job_id: >-
          {{
            job_id_env if job_id_env | length > 0
            else (running_job_query.json.results[0].id | string
                  if running_job_query.json.results | default([]) | length > 0
                  else 'N/A')
          }}

    # -----------------------------------------------------------------------
    # T008 (cont.) — Fetch all hosts with pagination
    # -----------------------------------------------------------------------

    - name: Fetch first page of hosts
      ansible.builtin.uri:
        url: "{{ api_base }}/hosts/?page_size=200"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: 200
        return_content: true
      register: first_page
      changed_when: false

    - name: Set total page count and initialize accumulator
      ansible.builtin.set_fact:
        all_hosts_raw: "{{ first_page.json.results }}"
        total_pages: "{{ [(first_page.json.count / 200) | round(0, 'ceil') | int, 1] | max }}"

    - name: Fetch remaining host pages
      ansible.builtin.uri:
        url: "{{ api_base }}/hosts/?page_size=200&page={{ item }}"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: 200
        return_content: true
      loop: "{{ range(2, total_pages | int + 1) | list }}"
      register: remaining_pages
      changed_when: false
      when: total_pages | int > 1

    - name: Append remaining pages to accumulator
      ansible.builtin.set_fact:
        all_hosts_raw: "{{ all_hosts_raw + (remaining_pages.results | map(attribute='json.results') | flatten | list) }}"
      when: total_pages | int > 1

    # -----------------------------------------------------------------------
    # T009 — Normalize host names to lowercase
    # -----------------------------------------------------------------------

    - name: Normalize host names to lowercase
      ansible.builtin.set_fact:
        normalized_names: "{{ all_hosts_raw | map(attribute='name') | map('lower') | list }}"
        normalized_enabled: "{{ all_hosts_raw | selectattr('enabled', 'equalto', true) | map(attribute='name') | map('lower') | list }}"

    # -----------------------------------------------------------------------
    # T010 — Deduplicate by normalized name
    #         Note: IP vs FQDN for the same host are NOT auto-resolved.
    #         See docs/limitations.md for details.
    # -----------------------------------------------------------------------

    - name: Deduplicate host names
      ansible.builtin.set_fact:
        deduplicated_hosts: "{{ normalized_names | unique | list }}"
        deduplicated_enabled: "{{ normalized_enabled | unique | list }}"

    # -----------------------------------------------------------------------
    # T002/T003 — Probe host_metrics endpoint; set availability flag + defaults
    # -----------------------------------------------------------------------

    - name: Probe host metrics endpoint
      ansible.builtin.uri:
        url: "{{ api_base }}/host_metrics/?page_size=1"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: [200, 404, 403, 500]
        return_content: true
      register: metrics_probe
      changed_when: false
      failed_when: false

    - name: Set host metrics defaults
      ansible.builtin.set_fact:
        host_metrics_available: "{{ metrics_probe.status == 200 }}"
        host_metrics_summary:
          available: false
          total_in_metrics: 0
          automated: 0
          not_automated: 0
          most_recent_automation: ""

    - name: Log host metrics availability
      ansible.builtin.debug:
        msg: >-
          {{
            'Host metrics endpoint available.' if metrics_probe.status == 200
            else 'Host metrics not available on this platform (404).' if metrics_probe.status == 404
            else 'Host metrics not available — permission denied (403). Ensure credential has System Auditor role.' if metrics_probe.status == 403
            else 'Host metrics returned unexpected status ' + (metrics_probe.status | string) + '; skipping metrics.'
          }}

    # -----------------------------------------------------------------------
    # T004/T005/T006 — Fetch and aggregate host metrics (when available)
    # -----------------------------------------------------------------------

    - name: Fetch automated host count
      ansible.builtin.uri:
        url: "{{ api_base }}/host_metrics/?automated_counter__gt=0&page_size=1"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: [200, 400]
        return_content: true
      register: metrics_automated
      changed_when: false
      failed_when: false
      when: host_metrics_available

    - name: Fetch most recent automation date
      ansible.builtin.uri:
        url: "{{ api_base }}/host_metrics/?ordering=-last_automation&page_size=1"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: [200]
        return_content: true
      register: metrics_recent
      changed_when: false
      failed_when: false
      when: host_metrics_available

    - name: Build host metrics summary
      ansible.builtin.set_fact:
        host_metrics_summary:
          available: true
          total_in_metrics: "{{ metrics_probe.json.count | int }}"
          automated: "{{ metrics_automated.json.count | default(0) | int }}"
          not_automated: "{{ metrics_probe.json.count | int - metrics_automated.json.count | default(0) | int }}"
          most_recent_automation: "{{ metrics_recent.json.results[0].last_automation | default('') if metrics_recent.json.results | default([]) | length > 0 else '' }}"
      when: host_metrics_available

    # -----------------------------------------------------------------------
    # T002/T003 — Fetch last 10 completed jobs; build IDs list + defaults
    # -----------------------------------------------------------------------

    - name: Fetch last 10 completed jobs
      ansible.builtin.uri:
        url: "{{ api_base }}/jobs/?status__in=successful,failed&order_by=-id&page_size=10"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: [200]
        return_content: true
      register: recent_jobs
      changed_when: false
      failed_when: false

    - name: Build recent job IDs list and set job events defaults
      ansible.builtin.set_fact:
        recent_job_ids: >-
          {{
            recent_jobs.json.results | default([])
            | map(attribute='id') | map('string')
            | select('ne', job_id | string) | list
          }}
        job_events_available: false
        hosts_with_recent_failures: ""
        hosts_with_recent_success: ""
        host_activity_list: []

    - name: Set recent job IDs string
      ansible.builtin.set_fact:
        recent_job_ids_str: "{{ recent_job_ids | join(',') }}"

    - name: Log recent jobs status
      ansible.builtin.debug:
        msg: >-
          {{
            'Found ' + (recent_job_ids | length | string) + ' recent completed job(s) for event query.'
            if recent_job_ids | length > 0
            else 'No completed jobs found for event query — skipping host activity section.'
          }}

    # -----------------------------------------------------------------------
    # T004–T010 — Fetch job events; aggregate per-host last status
    # -----------------------------------------------------------------------

    - name: Fetch job events page 1
      ansible.builtin.uri:
        url: "{{ api_base }}/job_events/?job__in={{ recent_job_ids_str }}&host_name__gt=&event__startswith=runner_on&order_by=-created&page_size=200"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: [200]
        return_content: true
      register: job_events_page1
      changed_when: false
      failed_when: false
      when: recent_job_ids | length > 0

    - name: Set initial job events accumulator
      ansible.builtin.set_fact:
        all_job_events: "{{ job_events_page1.json.results | default([]) }}"
        job_events_total_pages: "{{ [(job_events_page1.json.count | default(0) | int / 200) | round(0, 'ceil') | int, 1] | max }}"
      when: recent_job_ids | length > 0

    - name: Fetch remaining job event pages
      ansible.builtin.uri:
        url: "{{ api_base }}/job_events/?job__in={{ recent_job_ids_str }}&host_name__gt=&event__startswith=runner_on&order_by=-created&page_size=200&page={{ item }}"
        method: GET
        headers:
          Authorization: "{{ 'Bearer ' + controller_token if controller_token | length > 0 else omit }}"
        url_username: "{{ controller_user if controller_token | length == 0 else omit }}"
        url_password: "{{ controller_pass if controller_token | length == 0 else omit }}"
        force_basic_auth: "{{ true if controller_token | length == 0 else omit }}"
        validate_certs: false
        status_code: [200]
        return_content: true
      loop: "{{ range(2, job_events_total_pages | int + 1) | list }}"
      register: job_events_remaining
      changed_when: false
      when: recent_job_ids | length > 0 and job_events_total_pages | int > 1

    - name: Accumulate all job event pages
      ansible.builtin.set_fact:
        all_job_events: "{{ all_job_events + (job_events_remaining.results | map(attribute='json.results') | flatten | list) }}"
      when: recent_job_ids | length > 0 and job_events_total_pages | int > 1

    - name: Get unique event hostnames
      ansible.builtin.set_fact:
        event_hosts: >-
          {{
            all_job_events | default([])
            | map(attribute='host_name') | map('lower')
            | select('ne', '') | unique | list
          }}
      when: recent_job_ids | length > 0

    - name: Build per-host last-status list
      ansible.builtin.set_fact:
        host_activity_list: >-
          {{
            host_activity_list | default([]) + [{
              'hostname': item,
              'last_status': (
                'ok' if (all_job_events | selectattr('host_name', 'equalto', item) | sort(attribute='created', reverse=true) | first).event | default('') in ['runner_on_ok', 'runner_on_changed']
                else 'failed' if (all_job_events | selectattr('host_name', 'equalto', item) | sort(attribute='created', reverse=true) | first).event | default('') == 'runner_on_failed'
                else 'unreachable' if (all_job_events | selectattr('host_name', 'equalto', item) | sort(attribute='created', reverse=true) | first).event | default('') == 'runner_on_unreachable'
                else 'skipped' if (all_job_events | selectattr('host_name', 'equalto', item) | sort(attribute='created', reverse=true) | first).event | default('') == 'runner_on_skipped'
                else 'unknown'
              ),
              'last_seen': (all_job_events | selectattr('host_name', 'equalto', item) | sort(attribute='created', reverse=true) | first).created | default('')
            }]
          }}
      loop: "{{ event_hosts }}"
      when: recent_job_ids | length > 0 and event_hosts | length > 0

    - name: Build job event aggregates
      ansible.builtin.set_fact:
        job_events_available: true
        hosts_with_recent_failures: "{{ host_activity_list | selectattr('last_status', 'in', ['failed', 'unreachable']) | list | length }}"
        hosts_with_recent_success: "{{ host_activity_list | selectattr('last_status', 'equalto', 'ok') | list | length }}"
      when: recent_job_ids | length > 0 and event_hosts | default([]) | length > 0

    # -----------------------------------------------------------------------
    # T011/T012 — Build count result
    # -----------------------------------------------------------------------

    - name: Build count result
      ansible.builtin.set_fact:
        count_result:
          timestamp: "{{ run_timestamp }}"
          controller_url: "{{ controller_host }}"
          total_count: "{{ deduplicated_hosts | length }}"
          enabled_count: "{{ deduplicated_enabled | length }}"
          disabled_count: "{{ (deduplicated_hosts | length) - (deduplicated_enabled | length) }}"
          job_id: "{{ job_id }}"
          metrics_available: "{{ host_metrics_summary.available }}"
          hosts_in_metrics: "{{ host_metrics_summary.total_in_metrics }}"
          hosts_automated: "{{ host_metrics_summary.automated }}"
          hosts_not_automated: "{{ host_metrics_summary.not_automated }}"
          most_recent_automation: "{{ host_metrics_summary.most_recent_automation }}"
          job_events_available: "{{ job_events_available }}"
          hosts_with_recent_failures: "{{ hosts_with_recent_failures }}"
          hosts_with_recent_success: "{{ hosts_with_recent_success }}"

    # -----------------------------------------------------------------------
    # T012 — Pre-build host activity report lines (one per host)
    # -----------------------------------------------------------------------

    - name: Build host activity report lines
      ansible.builtin.set_fact:
        host_activity_lines: >-
          {{ (host_activity_lines | default([])) + ['  ' ~ item.hostname ~ ' : ' ~ item.last_status ~ ' (' ~ item.last_seen ~ ')'] }}
      loop: "{{ host_activity_list }}"
      when: job_events_available | bool

    # -----------------------------------------------------------------------
    # T013 — Print structured report to job log
    # -----------------------------------------------------------------------

    - name: Print managed node count report
      ansible.builtin.debug:
        msg: >-
          {{
            [
              '==============================================',
              '  Managed Node Count Report',
              '  Controller : ' + count_result.controller_url,
              '  API Base   : ' + api_base,
              '  Timestamp  : ' + count_result.timestamp,
              '  Job ID     : ' + count_result.job_id | string,
              '----------------------------------------------',
              '  Total Managed Nodes : ' + count_result.total_count | string,
              '  Enabled Nodes       : ' + count_result.enabled_count | string,
              '  Disabled Nodes      : ' + count_result.disabled_count | string,
              '----------------------------------------------',
            ] + (
              [
                '  Host Metrics (from host_metrics endpoint)',
                '  Hosts in Metrics    : ' + count_result.hosts_in_metrics | string,
                '  Automated (>=1 run) : ' + count_result.hosts_automated | string,
                '  Never Automated     : ' + count_result.hosts_not_automated | string,
                '  Most Recent Run     : ' + count_result.most_recent_automation,
              ] if count_result.metrics_available | bool
              else ['  Host Metrics        : Not available on this platform']
            ) + ['----------------------------------------------'] + (
              ['  Recent Host Activity (last 10 jobs)'] + (host_activity_lines | default([])) + [
                '  Hosts with failures : ' + count_result.hosts_with_recent_failures | string,
                '  Hosts successful    : ' + count_result.hosts_with_recent_success | string,
              ] if count_result.job_events_available | bool
              else ['  Recent Host Activity : No recent job event data available']
            ) + [
              '==============================================',
              'NOTE: Deduplication is case-insensitive name normalization.',
              'Hosts registered as both IP and FQDN count as separate nodes.',
              'See docs/limitations.md for full details.',
            ]
          }}

    # -----------------------------------------------------------------------
    # T014 — Write CSV report to output/managed_node_count.csv
    # -----------------------------------------------------------------------

    - name: Write CSV report
      ansible.builtin.copy:
        content: |
          timestamp,controller_url,total_count,enabled_count,disabled_count,job_id,metrics_available,hosts_in_metrics,hosts_automated,hosts_not_automated,most_recent_automation,hosts_with_recent_failures,hosts_with_recent_success
          {{ count_result.timestamp }},{{ count_result.controller_url }},{{ count_result.total_count }},{{ count_result.enabled_count }},{{ count_result.disabled_count }},{{ count_result.job_id }},{{ count_result.metrics_available }},{{ count_result.hosts_in_metrics }},{{ count_result.hosts_automated }},{{ count_result.hosts_not_automated }},{{ count_result.most_recent_automation }},{{ count_result.hosts_with_recent_failures }},{{ count_result.hosts_with_recent_success }}
        dest: "{{ playbook_dir }}/../output/managed_node_count_{{ count_result.timestamp | replace(':', '-') }}.csv"
        mode: "0644"

    # -----------------------------------------------------------------------
    # T015 — Confirm CSV write in job log
    # -----------------------------------------------------------------------

    - name: Confirm CSV written
      ansible.builtin.debug:
        msg: "CSV report written to output/managed_node_count_{{ count_result.timestamp | replace(':', '-') }}.csv"

    # -----------------------------------------------------------------------
    # Push CSV to GitHub repository output/ directory via GitHub Contents API
    # -----------------------------------------------------------------------

    - name: Set GitHub context
      ansible.builtin.set_fact:
        github_token: "{{ lookup('env', 'GITHUB_TOKEN') }}"
        github_repo_owner: "{{ lookup('env', 'GITHUB_REPO_OWNER') }}"
        github_repo_name: "{{ lookup('env', 'GITHUB_REPO_NAME') }}"
        github_repo_branch: "{{ lookup('env', 'GITHUB_REPO_BRANCH') }}"
        csv_filename: "managed_node_count_{{ count_result.timestamp | replace(':', '-') }}.csv"

    - name: Assert GitHub credentials are present
      ansible.builtin.assert:
        that:
          - github_token | length > 0
          - github_repo_owner | length > 0
          - github_repo_name | length > 0
          - github_repo_branch | length > 0
        fail_msg: >-
          GitHub credential environment variables not set.
          GITHUB_TOKEN={{ 'SET' if github_token | length > 0 else 'MISSING' }}
          GITHUB_REPO_OWNER={{ 'SET' if github_repo_owner | length > 0 else 'MISSING' }}
          GITHUB_REPO_NAME={{ 'SET' if github_repo_name | length > 0 else 'MISSING' }}
          GITHUB_REPO_BRANCH={{ 'SET' if github_repo_branch | length > 0 else 'MISSING' }}
          Attach the "GitHub Repository Credential" to this job template.
        success_msg: "GitHub credential validation passed."

    - name: Build CSV content for GitHub
      ansible.builtin.set_fact:
        csv_content_raw: "timestamp,controller_url,total_count,enabled_count,disabled_count,job_id,metrics_available,hosts_in_metrics,hosts_automated,hosts_not_automated,most_recent_automation,hosts_with_recent_failures,hosts_with_recent_success\n{{ count_result.timestamp }},{{ count_result.controller_url }},{{ count_result.total_count }},{{ count_result.enabled_count }},{{ count_result.disabled_count }},{{ count_result.job_id }},{{ count_result.metrics_available }},{{ count_result.hosts_in_metrics }},{{ count_result.hosts_automated }},{{ count_result.hosts_not_automated }},{{ count_result.most_recent_automation }},{{ count_result.hosts_with_recent_failures }},{{ count_result.hosts_with_recent_success }}\n"

    - name: Push CSV to GitHub repository
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_repo_owner }}/{{ github_repo_name }}/contents/output/{{ csv_filename }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ github_token }}"
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        body_format: json
        body:
          message: "chore: add managed node count report {{ count_result.timestamp }}"
          content: "{{ csv_content_raw | b64encode }}"
          branch: "{{ github_repo_branch }}"
        status_code: [200, 201]
      register: github_push_result

    - name: Confirm CSV pushed to GitHub
      ansible.builtin.debug:
        msg: "CSV pushed to GitHub: {{ github_push_result.json.content.html_url }}"

    # -----------------------------------------------------------------------
    # Publish count data as AAP job artifacts (accessible via API after run)
    # -----------------------------------------------------------------------

    - name: Publish count result as AAP artifacts
      ansible.builtin.set_stats:
        data:
          managed_node_count_timestamp: "{{ count_result.timestamp }}"
          managed_node_count_controller: "{{ count_result.controller_url }}"
          managed_node_count_total: "{{ count_result.total_count }}"
          managed_node_count_enabled: "{{ count_result.enabled_count }}"
          managed_node_count_disabled: "{{ count_result.disabled_count }}"
          managed_node_count_job_id: "{{ count_result.job_id }}"
          managed_node_count_metrics_available: "{{ count_result.metrics_available }}"
          managed_node_count_hosts_in_metrics: "{{ count_result.hosts_in_metrics }}"
          managed_node_count_hosts_automated: "{{ count_result.hosts_automated }}"
          managed_node_count_hosts_not_automated: "{{ count_result.hosts_not_automated }}"
          managed_node_count_most_recent_automation: "{{ count_result.most_recent_automation }}"
          managed_node_count_job_events_available: "{{ count_result.job_events_available }}"
          managed_node_count_hosts_with_failures: "{{ count_result.hosts_with_recent_failures }}"
          managed_node_count_hosts_with_success: "{{ count_result.hosts_with_recent_success }}"
        per_host: false
