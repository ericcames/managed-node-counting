# Credential Type Definitions for the Managed Node Count Playbook
# Two credential types are required — see docs/README.md for setup instructions.

# ── 1. AAP Node Count Credential ─────────────────────────────────────────────
# Provides controller connection details (host + auth token or username/password)

# AAP Node Count Credential — Custom Credential Type definition
# Copy these blocks into the AAP/Tower UI when creating the credential type.
# See docs/README.md for step-by-step instructions.

input_configuration:
  fields:
    - id: controller_host
      type: string
      label: "Controller Host"
      help_text: >
        Full HTTPS URL of the AAP or Ansible Tower controller.
        Example: https://aap.example.com
        Do NOT include a trailing slash.
    - id: controller_oauth_token
      type: string
      label: "Controller OAuth2 Token"
      secret: true
      help_text: >
        Personal access token with read access to the controller API.
        Generate via: User menu → Tokens → Add (scope: Read).
        Leave blank to use username/password instead.
    - id: controller_username
      type: string
      label: "Controller Username"
      help_text: >
        Username for basic authentication. Used only when OAuth2 token is blank.
    - id: controller_password
      type: string
      label: "Controller Password"
      secret: true
      help_text: >
        Password for basic authentication. Used only when OAuth2 token is blank.
  required:
    - controller_host

injector_configuration:
  env:
    CONTROLLER_HOST: "{{ controller_host }}"
    CONTROLLER_OAUTH_TOKEN: "{{ controller_oauth_token }}"
    CONTROLLER_USERNAME: "{{ controller_username }}"
    CONTROLLER_PASSWORD: "{{ controller_password }}"

# ── 2. GitHub Repository Credential ──────────────────────────────────────────
# Provides GitHub token and repo details for pushing CSV output to the repo.
# The token requires: Contents (read and write) permission on the target repo.

github_credential_type:
  input_configuration:
    fields:
      - id: github_token
        type: string
        label: "GitHub Personal Access Token"
        secret: true
        help_text: >
          Fine-grained PAT with Contents (read/write) permission on the target
          repository. Generate at: github.com → Settings → Developer settings
          → Personal access tokens → Fine-grained tokens → Generate new token.
      - id: github_repo_owner
        type: string
        label: "Repository Owner"
        help_text: "GitHub username or organisation (e.g. ericcames)"
      - id: github_repo_name
        type: string
        label: "Repository Name"
        help_text: "Repository name without owner (e.g. managed-node-counting)"
      - id: github_repo_branch
        type: string
        label: "Branch"
        help_text: "Branch to commit CSV files to (e.g. 001-ansible-node-count)"
    required:
      - github_token
      - github_repo_owner
      - github_repo_name
      - github_repo_branch

  injector_configuration:
    env:
      GITHUB_TOKEN: "{{ github_token }}"
      GITHUB_REPO_OWNER: "{{ github_repo_owner }}"
      GITHUB_REPO_NAME: "{{ github_repo_name }}"
      GITHUB_REPO_BRANCH: "{{ github_repo_branch }}"
